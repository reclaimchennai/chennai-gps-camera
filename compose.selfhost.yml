# Self-hosting: docker compose -f compose.selfhost.yml up -d
# Serves the app on http://localhost:8080 (secure-context note in README).
services:
  gps-camera:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
